services:
  # Serviciul pentru baza de date MySQL
  db:
    image: mysql:8.0
    container_name: flappy_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD} # Ia parola din fișierul .env
      MYSQL_DATABASE: ${DB_NAME}         # Ia numele bazei de date din .env
    ports:
      - "3306:3306"
    volumes:
      # Montează scriptul de inițializare pentru a fi rulat la prima pornire
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
      # Persistă datele bazei de date chiar dacă oprești containerul
      - mysql_data:/var/lib/mysql

  # Serviciul pentru backend-ul Node.js
  backend:
    build: . # Construiește imaginea din folderul curent (unde se află Dockerfile)
    container_name: flappy_backend
    restart: always
    depends_on:
      - db # Pornește doar după ce serviciul `db` este gata
    ports:
      - "3000:3000" # Leagă portul 3000 al containerului de portul 3000 al mașinii tale
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - EMAIL_FROM=${EMAIL_FROM}

volumes:
  mysql_data: