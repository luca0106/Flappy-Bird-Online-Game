<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Flappy Bird 2026</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="background-animation"></div>

    <div class="auth-container">
        <div class="auth-content">
            <div class="logo-container">
                <div class="logo-bird"></div>
                <h1 class="game-title">FLAPPY BIRD</h1>
            </div>

            <div class="form-toggle">
                <button id="showLoginBtn" class="toggle-btn active">Login</button>
                <button id="showRegisterBtn" class="toggle-btn">Register</button>
            </div>

            <form id="loginForm" class="auth-form">
                <h3>Login to your Account</h3>
                <input type="email" id="loginEmail" placeholder="Email" required>
                <div class="password-wrapper">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="button" class="password-toggle" data-for="loginPassword">👁️</button>
                </div>
                <button type="submit" id="loginSubmit">Login</button>
            </form>

            <form id="registerForm" class="auth-form" style="display: none;">
                <h3>Create a New Account</h3>
                <!-- Pasul 1: Introducere Email -->
                <div id="registerStep1">
                    <input type="email" id="registerEmail" placeholder="Enter your email" required>
                    <button type="button" id="sendCodeBtn">Send Verification Code</button>
                </div>
                <!-- Pasul 2: Verificare și Detalii Cont -->
                <div id="registerStep2" style="display: none;">
                    <p class="verification-info">A code has been sent to <strong id="sentToEmail"></strong>.</p>
                    <input type="text" id="verificationCode" placeholder="6-Digit Code" required pattern="\d{6}" title="Enter the 6-digit code.">
                    <input type="text" id="registerUsername" placeholder="Choose a username" required>
                    <div class="password-wrapper">
                        <input type="password" id="registerPassword" placeholder="Choose a password" required>
                        <button type="button" class="password-toggle" data-for="registerPassword">👁️</button>
                    </div>
                    <button type="submit" id="registerSubmit">Create Account</button>
                </div>
            </form>

            <p class="back-to-game"><a href="index.html">← Back to Main Menu</a></p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
