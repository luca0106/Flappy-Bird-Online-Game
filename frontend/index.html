<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird 2026 - Modern Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="main-container">
        <!-- Start Screen -->
        <div class="start-screen" id="startScreen">
            <!-- Auth/Profile Container - Top Right -->
            <div class="stats-container">
                <!-- Logged In View -->
                <div class="user-profile" id="userProfile" style="display: none;">
                    <span id="welcomeMessage"></span>
                    <div class="profile-stat">
                        <span class="stat-label">Best Score</span>
                        <span class="stat-value" id="bestScore">0</span>
                    </div>
                    <button id="logoutButton" class="auth-button">Logout</button>
                </div>
                <!-- Guest View -->
                <div class="guest-view" id="guestView">
                    <div class="stat-box">
                        <span class="stat-label">Local Best</span>
                        <span class="stat-value" id="localBestScore">0</span>
                    </div>
                    <button class="auth-button" id="loginPageButton">Login / Register</button>
                </div>
            </div>

            <!-- Global Leaderboard - Top Left -->
            <div class="leaderboard-container">
                <h3 class="leaderboard-title">GLOBAL LEADERBOARD</h3>
                <ol class="leaderboard-list" id="leaderboardList">
                    <!-- Leaderboard data will be injected here by JS -->
                </ol>
            </div>

            <div class="start-content">
                <div class="logo-container">
                    <div class="logo-bird"></div>
                    <h1 class="game-title">FLAPPY BIRD</h1>
                    <p class="subtitle">2026 Edition</p>
                </div>
                
                <button class="start-button" id="startButton">
                    <span class="button-text">START GAME</span>
                    <span class="button-glow"></span>
                </button>
                
                <div class="skin-selector-container">
                    <p class="skin-title">BIRD SKINS</p>
                    <div class="skin-selector" id="skinSelector">
                        <!-- Skins injected via JS -->
                    </div>
                </div>
                
                <div class="controls-info">
                    <p><strong>Controls:</strong> SPACE or CLICK to jump | <strong>P:</strong> Pause</p>
                </div>
            </div>
        </div>
        
        <!-- Game Screen -->
        <div class="game-screen" id="gameScreen" style="display: none;">
            <canvas id="gameCanvas"></canvas>
            
            <!-- In-Game HUD -->
            <div class="game-hud" id="gameHUD">
                <div class="current-score-box">
                    <span class="score-label">SCORE</span>
                    <span class="score-value" id="currentScore">0</span>
                </div>
            </div>

            <!-- Countdown Overlay -->
            <div class="countdown-overlay" id="countdownOverlay" style="display: none;">
                <div class="countdown-text" id="countdownText">3</div>
            </div>

            <!-- Pause Overlay -->
            <div class="pause-overlay" id="pauseOverlay" style="display: none;">
                <div class="pause-content">
                    <h2>PAUSED</h2>
                    <p>Press 'P' to resume</p>
                </div>
            </div>

            <button class="menu-button" id="menuButton">≡</button>
            
            <!-- Game Over Modal -->
            <div class="game-over-modal" id="gameOverModal" style="display: none;">
                <div class="modal-content">
                    <h2>GAME OVER</h2>
                    <div class="final-stats">
                        <div class="stat">
                            <span class="label">Final Score</span>
                            <span class="value" id="finalScore">0</span>
                        </div>
                        <div class="stat">
                            <span class="label">Best Score</span>
                            <span class="value" id="bestScoreModal">0</span>
                        </div>
                    </div>
                    <div class="modal-buttons">
                        <button class="restart-button" id="restartButton">PLAY AGAIN</button>
                        <button class="menu-back-button" id="menuBackButton">MAIN MENU</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Biblioteca pentru decodarea token-urilor JWT în frontend -->
    <script src="game.js"></script>
</body>
</html>
