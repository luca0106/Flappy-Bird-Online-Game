<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird 2026 - Modern Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="main-container">
        <!-- Start Screen -->
        <div class="start-screen" id="startScreen">
            <div class="start-content">
                <div class="logo-container">
                    <div class="logo-bird"></div>
                    <h1 class="game-title">FLAPPY BIRD</h1>
                    <p class="subtitle">2026 Edition</p>
                </div>
                
                <div class="stats-container">
                    <div class="user-profile" id="userProfile" style="display: none;">
                        <span id="welcomeMessage"></span>
                        <button id="logoutButton">Logout</button>
                    </div>
                    <div class="guest-view" id="guestView">
                        <div class="stat-box">
                            <span class="stat-label">Best Score</span>
                            <span class="stat-value" id="bestScore">0</span>
                        </div>
                        <button class="auth-button" id="authButton">Login / Register</button>
                    </div>
                </div>
                
                <button class="start-button" id="startButton">
                    <span class="button-text">START GAME</span>
                    <span class="button-glow"></span>
                </button>
                
                <div class="skin-selector-container">
                    <p class="skin-title">BIRD SKINS</p>
                    <div class="skin-selector" id="skinSelector">
                        <!-- Skins injected via JS -->
                    </div>
                </div>
                
                <div class="controls-info">
                    <p><strong>Controls:</strong> SPACE or CLICK to jump | <strong>P:</strong> Pause</p>
                </div>
            </div>
        </div>
        
        <!-- Game Screen -->
        <div class="game-screen" id="gameScreen" style="display: none;">
            <canvas id="gameCanvas"></canvas>
            
            <!-- In-Game HUD -->
            <div class="game-hud" id="gameHUD">
                <div class="current-score-box">
                    <span class="score-label">SCORE</span>
                    <span class="score-value" id="currentScore">0</span>
                </div>
            </div>

            <!-- Countdown Overlay -->
            <div class="countdown-overlay" id="countdownOverlay" style="display: none;">
                <div class="countdown-text" id="countdownText">3</div>
            </div>

            <!-- Pause Overlay -->
            <div class="pause-overlay" id="pauseOverlay" style="display: none;">
                <div class="pause-content">
                    <h2>PAUSED</h2>
                    <p>Press 'P' to resume</p>
                </div>
            </div>

            <button class="menu-button" id="menuButton">≡</button>
            
            <!-- Game Over Modal -->
            <div class="game-over-modal" id="gameOverModal" style="display: none;">
                <div class="modal-content">
                    <h2>GAME OVER</h2>
                    <div class="final-stats">
                        <div class="stat">
                            <span class="label">Final Score</span>
                            <span class="value" id="finalScore">0</span>
                        </div>
                        <div class="stat">
                            <span class="label">Best Score</span>
                            <span class="value" id="bestScoreModal">0</span>
                        </div>
                    </div>
                    <div class="modal-buttons">
                        <button class="restart-button" id="restartButton">PLAY AGAIN</button>
                        <button class="menu-back-button" id="menuBackButton">MAIN MENU</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Auth Modal -->
        <div class="auth-modal" id="authModal" style="display: none;">
            <div class="auth-modal-content">
                <button class="close-button" id="closeAuthModal">&times;</button>
                <div id="loginView">
                    <h3>Login</h3>
                    <input type="email" id="loginEmail" placeholder="Email" required>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button id="loginSubmit">Login</button>
                    <p>New here? <a href="#" id="showRegister">Create an account</a></p>
                </div>
                <div id="registerView" style="display: none;">
                    <h3>Register</h3>
                    <input type="email" id="registerEmail" placeholder="Email" required>
                    <input type="password" id="registerPassword" placeholder="Password" required>
                    <button id="registerSubmit">Register</button>
                    <p>Already have an account? <a href="#" id="showLogin">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
